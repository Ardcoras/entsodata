---
apiVersion: v1
kind: Namespace
metadata:
  name: entsodata
---
apiVersion: v1
kind: Secret
metadata:
  name: entsoe-secrets
  namespace: entsodata
type: Opaque
stringData:
  api-key: "YOUR_ENTSOE_API_KEY" # Replace before applying
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: entsodata
  namespace: entsodata
  labels:
    app: entsodata
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: entsodata
  template:
    metadata:
      labels:
        app: entsodata
        version: v1
    spec:
      containers:
      - name: entsodata
        image: ghcr.io/ardcoras/entsodata:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ENTSOE_API_KEY
          valueFrom:
            secretKeyRef:
              name: entsoe-secrets
              key: api-key
        - name: PORT
          value: "8080"
        - name: DEBUG
          value: "false"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: entsodata
  namespace: entsodata
  labels:
    app: entsodata
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: entsodata
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: entsodata-cert
  namespace: entsodata
spec:
  secretName: entsodata-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - entsodata.ardcoras.fi
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: data-route
  namespace: entsodata
spec:
  entryPoints:
    - websecure
    - web
  tls:
    secretName: entsodata-tls
  routes:
    - match: Host(`entsodata.ardcoras.fi`)
      kind: Rule
      middlewares:
        - name: headers-default@file
      services:
        - name: entsodata
          port: 8080
