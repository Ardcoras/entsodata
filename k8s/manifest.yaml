---
apiVersion: v1
kind: Namespace
metadata:
  name: entsodata
---
apiVersion: v1
kind: Secret
metadata:
  name: entsoe-secrets
  namespace: entsodata
type: Opaque
stringData:
  api-key: "YOUR_ENTSOE_API_KEY" # Replace before applying
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: entsodata
  namespace: entsodata
  labels:
    app: entsodata
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: entsodata
  template:
    metadata:
      labels:
        app: entsodata
        version: v1
    spec:
      containers:
      - name: entsodata
        image: ghcr.io/YOUR_GITHUB_USERNAME/entsodata:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ENTSOE_API_KEY
          valueFrom:
            secretKeyRef:
              name: entsoe-secrets
              key: api-key
        - name: PORT
          value: "8080"
        - name: DEBUG
          value: "false"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: entsodata-service
  namespace: entsodata
  labels:
    app: entsodata
spec:
  selector:
    app: entsodata
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: entsodata-ingress
  namespace: entsodata
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx # Update depending on the cluster's default
  rules:
  - host: proxy.spotclock.example.com # Replace with desired domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: entsodata-service
            port:
              number: 80
